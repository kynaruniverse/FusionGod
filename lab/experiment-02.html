<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYNAR LAB // EXP-002</title>
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

    .exp-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-height);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-lg);
      background: rgba(6,6,10,0.95);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .exp-header__info { display: flex; flex-direction: column; gap: 2px; }
    .exp-header__id { font-family: var(--font-terminal); font-size: var(--text-xs); color: var(--accent); letter-spacing: 0.2em; }
    .exp-header__name { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-bright); }
    .exp-back { font-family: var(--font-terminal); font-size: var(--text-xs); color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; }
    .exp-back:hover { color: var(--silver); }

    .glitch-stage {
      flex: 1;
      margin-top: var(--nav-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl) var(--space-lg);
      gap: var(--space-xl);
    }

    /* Input */
    .glitch-input-wrap {
      display: flex;
      gap: var(--space-md);
      align-items: center;
      width: 100%;
      max-width: 600px;
    }

    .glitch-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
      color: var(--text-bright);
      font-family: var(--font-terminal);
      font-size: var(--text-base);
      padding: var(--space-md);
      letter-spacing: 0.1em;
      outline: none;
      transition: border-color 0.2s;
    }

    .glitch-input:focus { border-color: var(--accent); }

    .glitch-input::placeholder { color: var(--text-dim); }

    /* Display */
    .glitch-display {
      position: relative;
      text-align: center;
      cursor: pointer;
      padding: var(--space-lg);
    }

    .glitch-text {
      font-family: var(--font-ui);
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-bright);
      position: relative;
      display: inline-block;
      line-height: 1.1;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      background: var(--bg);
    }

    .glitch-text::before {
      color: var(--accent);
      animation: glitchA 2.5s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }

    .glitch-text::after {
      color: var(--silver);
      animation: glitchB 2.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    }

    @keyframes glitchA {
      0%,89%,100% { transform: none; opacity: 0; }
      90%   { transform: translateX(-4px); opacity: 0.8; }
      91%   { transform: translateX(4px);  opacity: 0.6; }
      92%   { transform: translateX(-2px); opacity: 0.9; }
      93%   { transform: none; opacity: 0; }
      96%   { transform: translateX(3px);  opacity: 0.5; }
      97%   { transform: none; opacity: 0; }
    }

    @keyframes glitchB {
      0%,87%,100% { transform: none; opacity: 0; }
      88%   { transform: translateX(5px);  opacity: 0.7; }
      89%   { transform: translateX(-3px); opacity: 0.5; }
      90%   { transform: none; opacity: 0; }
      94%   { transform: translateX(-4px); opacity: 0.6; }
      95%   { transform: none; opacity: 0; }
    }

    /* Intensity controls */
    .controls-row {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
    }

    .ctrl-btn {
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: var(--space-sm) var(--space-md);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover, .ctrl-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Glitch intensities */
    .intensity-low .glitch-text::before,
    .intensity-low .glitch-text::after { animation-duration: 6s; }

    .intensity-high .glitch-text::before { animation: glitchHigh 0.4s infinite; clip-path: polygon(0 0%, 100% 0%, 100% 100%, 0 100%); }
    .intensity-high .glitch-text::after  { animation: glitchHigh2 0.3s infinite; clip-path: polygon(0 0%, 100% 0%, 100% 100%, 0 100%); }

    @keyframes glitchHigh {
      0%  { transform: translateX(-6px) skewX(-3deg); opacity: 0.7; clip-path: polygon(0 10%, 100% 10%, 100% 35%, 0 35%); }
      25% { transform: translateX(6px)  skewX(3deg);  opacity: 0.5; clip-path: polygon(0 50%, 100% 50%, 100% 70%, 0 70%); }
      50% { transform: translateX(-3px);              opacity: 0.8; clip-path: polygon(0 80%, 100% 80%, 100% 95%, 0 95%); }
      75% { transform: translateX(3px)  skewX(-2deg); opacity: 0.4; clip-path: polygon(0 25%, 100% 25%, 100% 45%, 0 45%); }
      100%{ transform: none;                          opacity: 0.6; clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
    }

    @keyframes glitchHigh2 {
      0%  { transform: translateX(8px);  opacity: 0.5; clip-path: polygon(0 5%,  100% 5%,  100% 20%, 0 20%); }
      33% { transform: translateX(-8px); opacity: 0.7; clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%); }
      66% { transform: translateX(4px);  opacity: 0.3; clip-path: polygon(0 75%, 100% 75%, 100% 90%, 0 90%); }
      100%{ transform: translateX(-4px); opacity: 0.6; clip-path: polygon(0 15%, 100% 15%, 100% 30%, 0 30%); }
    }

    .hint {
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-align: center;
    }
  </style>
</head>
<body class="scanlines">
  <header class="exp-header">
    <div class="exp-header__info">
      <div class="exp-header__id">EXP-002</div>
      <div class="exp-header__name">Glitch Type</div>
    </div>
    <a href="index.html" class="exp-back">← Back to Lab</a>
  </header>

  <main class="glitch-stage">

    <div class="glitch-input-wrap">
      <input
        class="glitch-input"
        id="textInput"
        type="text"
        placeholder="Type anything..."
        maxlength="20"
        value="KYNAR"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="glitch-display intensity-mid" id="glitchDisplay">
      <div class="glitch-text" id="glitchText" data-text="KYNAR">KYNAR</div>
    </div>

    <div class="controls-row">
      <button class="ctrl-btn" onclick="setIntensity('low',this)">LOW</button>
      <button class="ctrl-btn active" onclick="setIntensity('mid',this)">MID</button>
      <button class="ctrl-btn" onclick="setIntensity('high',this)">HIGH</button>
    </div>

    <p class="hint">Type in the field above — click the text to trigger a burst</p>

  </main>

  <script>
    const input   = document.getElementById('textInput');
    const display = document.getElementById('glitchDisplay');
    const text    = document.getElementById('glitchText');

    input.addEventListener('input', () => {
      const val = input.value || 'KYNAR';
      text.textContent  = val;
      text.dataset.text = val;
    });

    text.addEventListener('click', () => {
      text.style.animation = 'none';
      text.offsetHeight; // reflow
      text.style.animation = '';
    });

    function setIntensity(level, btn) {
      display.className = 'glitch-display intensity-' + level;
      document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
