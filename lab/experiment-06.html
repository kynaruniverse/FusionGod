<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYNAR LAB // EXP-006</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;700&family=Chakra+Petch:wght@300;400;700&family=Space+Mono&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06060a; --surface: #0e0e16; --border: #1e1e2e;
      --accent: #c0152a; --silver: #c8d0d8; --text: #a8b2bc;
      --text-bright: #e8edf2; --text-dim: #3a404a;
      --font-ui: 'Chakra Petch', sans-serif;
      --font-terminal: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-terminal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .exp-header {
      height: 48px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .exp-header__info { display: flex; flex-direction: column; gap: 1px; }
    .exp-header__id { font-size: 10px; color: var(--accent); letter-spacing: 0.2em; }
    .exp-header__name { font-family: var(--font-ui); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-bright); }
    .exp-back { font-size: 11px; color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; }
    .exp-back:hover { color: var(--silver); }

    /* Layout */
    .layout {
      flex: 1; display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    }

    /* Controls panel */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .panel__section-label {
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 10px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }

    .field input[type="text"],
    .field input[type="range"],
    .field select,
    .field textarea {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-bright); font-family: var(--font-terminal);
      font-size: 12px; padding: 8px; outline: none;
      transition: border-color 0.2s; width: 100%;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
    }

    .field textarea { resize: vertical; min-height: 60px; }

    .field select option { background: var(--bg); }

    .range-row { display: flex; gap: 8px; align-items: center; }
    .range-val { font-size: 11px; color: var(--accent); min-width: 36px; text-align: right; }

    input[type="range"] { padding: 0; accent-color: var(--accent); }

    .color-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-btn {
      width: 28px; height: 28px; border: 2px solid var(--border);
      cursor: pointer; transition: border-color 0.15s;
    }
    .color-btn.active { border-color: var(--accent); }
    .color-btn:hover { border-color: var(--silver); }

    .export-btn {
      font-family: var(--font-ui); font-size: 12px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--bg); background: var(--accent);
      border: none; padding: 10px; cursor: pointer;
      transition: background 0.2s; width: 100%;
    }

    .export-btn:hover { background: #ff0044; }

    /* Preview */
    .preview {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; overflow: hidden; position: relative;
    }

    .preview-bg {
      position: absolute; inset: 0;
      background: var(--bg);
    }

    .preview-bg.light { background: #f0f0f0; }
    .preview-bg.dark  { background: #06060a; }
    .preview-bg.red   { background: #1a0205; }

    #previewText {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 100%;
      word-break: break-word;
      transition: all 0.2s;
    }

    /* Export modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal.open { display: flex; }
    .modal__box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 24px; max-width: 500px; width: 100%; }
    .modal__title { font-family: var(--font-ui); font-size: 14px; color: var(--text-bright); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
    .modal__code { background: var(--bg); border: 1px solid var(--border); padding: 16px; font-size: 11px; color: var(--silver); line-height: 1.7; white-space: pre-wrap; word-break: break-all; margin-bottom: 16px; max-height: 240px; overflow-y: auto; }
    .modal__close { font-size: 11px; color: var(--text-dim); background: none; border: 1px solid var(--border); padding: 8px 16px; cursor: pointer; letter-spacing: 0.1em; transition: all 0.2s; }
    .modal__close:hover { color: var(--silver); border-color: var(--silver); }
  </style>
</head>
<body>

  <header class="exp-header">
    <div class="exp-header__info">
      <div class="exp-header__id">EXP-006</div>
      <div class="exp-header__name">Type Architect</div>
    </div>
    <a href="index.html" class="exp-back">← Back to Lab</a>
  </header>

  <div class="layout">

    <!-- Controls -->
    <div class="panel">

      <div>
        <div class="panel__section-label">Text Content</div>
        <div class="field">
          <label>Content</label>
          <textarea id="textContent" rows="3">KYNAR UNIVERSE</textarea>
        </div>
      </div>

      <div>
        <div class="panel__section-label">Font</div>
        <div class="field">
          <label>Family</label>
          <select id="fontFamily">
            <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
            <option value="'Chakra Petch', sans-serif">Chakra Petch</option>
            <option value="'Playfair Display', serif">Playfair Display</option>
            <option value="'JetBrains Mono', monospace" selected>JetBrains Mono</option>
            <option value="'Space Mono', monospace">Space Mono</option>
          </select>
        </div>
        <br>
        <div class="field">
          <label>Weight</label>
          <select id="fontWeight">
            <option value="300">Light 300</option>
            <option value="400" selected>Regular 400</option>
            <option value="700">Bold 700</option>
          </select>
        </div>
        <br>
        <div class="field">
          <label>Size — <span id="sizeVal">48</span>px</label>
          <div class="range-row">
            <input type="range" id="fontSize" min="12" max="160" value="48">
          </div>
        </div>
        <br>
        <div class="field">
          <label>Line Height — <span id="lhVal">1.2</span></label>
          <input type="range" id="lineHeight" min="0.8" max="2.5" step="0.1" value="1.2">
        </div>
        <br>
        <div class="field">
          <label>Letter Spacing — <span id="lsVal">0</span>em</label>
          <input type="range" id="letterSpacing" min="-0.1" max="0.8" step="0.01" value="0">
        </div>
        <br>
        <div class="field">
          <label>Transform</label>
          <select id="textTransform">
            <option value="none">None</option>
            <option value="uppercase" selected>UPPERCASE</option>
            <option value="lowercase">lowercase</option>
            <option value="capitalize">Capitalize</option>
          </select>
        </div>
      </div>

      <div>
        <div class="panel__section-label">Colour</div>
        <div class="color-btns" id="colorBtns">
          <div class="color-btn active" data-color="#e8edf2" style="background:#e8edf2"></div>
          <div class="color-btn" data-color="#c0152a" style="background:#c0152a"></div>
          <div class="color-btn" data-color="#c8d0d8" style="background:#c8d0d8"></div>
          <div class="color-btn" data-color="#00e5ff" style="background:#00e5ff"></div>
          <div class="color-btn" data-color="#00ff88" style="background:#00ff88"></div>
          <div class="color-btn" data-color="#ffd600" style="background:#ffd600"></div>
        </div>
      </div>

      <div>
        <div class="panel__section-label">Background</div>
        <div class="color-btns" id="bgBtns">
          <div class="color-btn active" data-bg="dark" style="background:#06060a; border-color: var(--accent);"></div>
          <div class="color-btn" data-bg="light" style="background:#f0f0f0"></div>
          <div class="color-btn" data-bg="red" style="background:#1a0205"></div>
        </div>
      </div>

      <button class="export-btn" onclick="exportCSS()">EXPORT CSS</button>
    </div>

    <!-- Preview -->
    <div class="preview">
      <div class="preview-bg dark" id="previewBg"></div>
      <div id="previewText" style="font-family:'JetBrains Mono',monospace; font-size:48px; color:#e8edf2; text-transform:uppercase; letter-spacing:0em; line-height:1.2; font-weight:400;">
        KYNAR UNIVERSE
      </div>
    </div>

  </div>

  <!-- Export Modal -->
  <div class="modal" id="exportModal">
    <div class="modal__box">
      <div class="modal__title">Generated CSS</div>
      <pre class="modal__code" id="cssOutput"></pre>
      <button class="modal__close" onclick="document.getElementById('exportModal').classList.remove('open')">Close</button>
    </div>
  </div>

  <script>
    const preview = document.getElementById('previewText');
    const bg      = document.getElementById('previewBg');
    let currentColor = '#e8edf2';

    function getVal(id) { return document.getElementById(id).value; }

    function update() {
      preview.style.fontFamily     = getVal('fontFamily');
      preview.style.fontSize       = getVal('fontSize') + 'px';
      preview.style.fontWeight     = getVal('fontWeight');
      preview.style.lineHeight     = getVal('lineHeight');
      preview.style.letterSpacing  = getVal('letterSpacing') + 'em';
      preview.style.textTransform  = getVal('textTransform');
      preview.style.color          = currentColor;
      preview.textContent          = getVal('textContent') || 'Type something';

      document.getElementById('sizeVal').textContent = getVal('fontSize');
      document.getElementById('lhVal').textContent   = parseFloat(getVal('lineHeight')).toFixed(1);
      document.getElementById('lsVal').textContent   = parseFloat(getVal('letterSpacing')).toFixed(2);
    }

    // Live inputs
    ['textContent','fontFamily','fontWeight','fontSize','lineHeight','letterSpacing','textTransform']
      .forEach(id => document.getElementById(id).addEventListener('input', update));

    // Text colours
    document.getElementById('colorBtns').querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#colorBtns .color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentColor = btn.dataset.color;
        update();
      });
    });

    // Background
    document.getElementById('bgBtns').querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#bgBtns .color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        bg.className = 'preview-bg ' + btn.dataset.bg;
      });
    });

    function exportCSS() {
      const css = `.your-text {
  font-family: ${getVal('fontFamily')};
  font-size: ${getVal('fontSize')}px;
  font-weight: ${getVal('fontWeight')};
  line-height: ${getVal('lineHeight')};
  letter-spacing: ${getVal('letterSpacing')}em;
  text-transform: ${getVal('textTransform')};
  color: ${currentColor};
}`;
      document.getElementById('cssOutput').textContent = css;
      document.getElementById('exportModal').classList.add('open');
    }

    update();
  </script>
</body>
</html>
