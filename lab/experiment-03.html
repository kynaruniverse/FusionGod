<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYNAR LAB // EXP-003</title>
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    body { background: #000; overflow: hidden; height: 100vh; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

    .exp-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-height);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-lg);
      background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      z-index: 10;
    }

    .exp-header__info { display: flex; flex-direction: column; gap: 2px; }
    .exp-header__id { font-family: var(--font-terminal); font-size: var(--text-xs); color: var(--accent); letter-spacing: 0.2em; }
    .exp-header__name { font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-bright); }
    .exp-back { font-family: var(--font-terminal); font-size: var(--text-xs); color: var(--text-dim); text-decoration: none; letter-spacing: 0.1em; transition: color 0.2s; }
    .exp-back:hover { color: var(--silver); }

    .controls {
      position: fixed;
      bottom: var(--space-lg);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: var(--space-sm);
      z-index: 10;
    }

    .ctrl-btn {
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.1);
      padding: var(--space-sm) var(--space-md);
      background: rgba(6,6,10,0.7);
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover, .ctrl-btn.active { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <header class="exp-header">
    <div class="exp-header__info">
      <div class="exp-header__id">EXP-003</div>
      <div class="exp-header__name">Signal Noise</div>
    </div>
    <a href="index.html" class="exp-back">← Back to Lab</a>
  </header>

  <div class="controls">
    <button class="ctrl-btn active" onclick="setMode('flow',this)">FLOW</button>
    <button class="ctrl-btn" onclick="setMode('static',this)">STATIC</button>
    <button class="ctrl-btn" onclick="setMode('pulse',this)">PULSE</button>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H, t = 0, mode = 'flow';

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Simple smooth noise using sine harmonics
    function noise(x, y, z) {
      return (
        Math.sin(x * 1.1 + z) * 0.3 +
        Math.sin(y * 0.9 - z * 0.7) * 0.3 +
        Math.sin((x + y) * 0.5 + z * 1.3) * 0.2 +
        Math.sin(x * 2.3 - y * 1.7 + z * 0.4) * 0.1 +
        Math.sin(y * 2.1 + z * 0.8) * 0.1
      );
    }

    const COLS = 80;
    const ROWS = 50;

    function render() {
      const cw = W / COLS;
      const ch = H / ROWS;

      t += mode === 'pulse' ? 0.04 : mode === 'static' ? 0.002 : 0.015;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const nx = c / COLS * 4;
          const ny = r / ROWS * 4;
          let n = noise(nx, ny, t);

          // Map noise to colour
          let alpha, r_, g_, b_;

          if (mode === 'flow') {
            // Crimson and silver flow
            const v = (n + 1) / 2;
            if (v > 0.6) {
              r_ = 192; g_ = 21; b_ = 42;
              alpha = (v - 0.6) * 2.5 * 0.7;
            } else if (v > 0.4) {
              r_ = 200; g_ = 208; b_ = 216;
              alpha = (v - 0.4) * 2 * 0.3;
            } else {
              r_ = 14; g_ = 14; b_ = 22;
              alpha = 1 - v * 1.5;
            }
          } else if (mode === 'static') {
            // Pure noise static
            const v = (n + 1) / 2;
            r_ = g_ = b_ = Math.floor(v * 60);
            alpha = v * 0.8 + 0.1;
          } else {
            // Pulse — expanding rings
            const dist = Math.sqrt((c/COLS-0.5)**2 + (r/ROWS-0.5)**2);
            const wave = Math.sin(dist * 12 - t * 3);
            const v = (wave + n * 0.3 + 1) / 2;
            r_ = 192; g_ = 21; b_ = 42;
            alpha = v * 0.5;
          }

          ctx.fillStyle = `rgba(${r_},${g_},${b_},${alpha.toFixed(2)})`;
          ctx.fillRect(Math.floor(c * cw), Math.floor(r * ch), Math.ceil(cw) + 1, Math.ceil(ch) + 1);
        }
      }

      requestAnimationFrame(render);
    }

    function setMode(m, btn) {
      mode = m;
      document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    render();
  </script>
</body>
</html>
