<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a14">
  <title>FUSIONGOD</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <style>
    /* (exact same CSS as your original — unchanged) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0a0a14; overflow: hidden; font-family: 'Rajdhani', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
    #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    #hud { position: absolute; top: 0; left: 0; right: 0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%); }
    .hud-stat { display: flex; align-items: center; gap: 6px; font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    #hud-hp { color: #ff4b6e; }
    #hud-gold { color: #ffd700; }
    #hud-depth { color: #a78fff; }
    .hud-icon { font-size: 18px; }
    #toast-container { position: absolute; top: 64px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; z-index: 200; }
    .toast { background: linear-gradient(135deg, rgba(20,10,40,0.96), rgba(40,20,60,0.96)); border: 1px solid rgba(255,215,0,0.4); border-radius: 8px; padding: 8px 20px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 0.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: toastIn 0.3s ease-out forwards; white-space: nowrap; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-8px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .toast.out { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-8px) scale(0.95); } }
    #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; background: rgba(0,0,0,0.92); backdrop-filter: blur(6px); }
    #overlay.hidden { display: none; }
    #overlay h1 { font-family: 'Cinzel', serif; font-size: clamp(32px, 8vw, 56px); font-weight: 900; letter-spacing: 4px; margin-bottom: 8px; }
    #overlay .title-god { color: #ffd700; }
    #overlay .title-fusion { color: #fff; }
    #overlay .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
    #overlay .btn { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border: none; padding: 14px 40px; border-radius: 8px; font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; cursor: pointer; pointer-events: all; box-shadow: 0 0 30px rgba(124,58,237,0.5); transition: all 0.2s; }
    #overlay .btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(124,58,237,0.7); }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="ui-layer">
    <div id="hud">
      <div class="hud-stat" id="hud-hp"><span class="hud-icon">♥</span><span id="hp-val">100</span></div>
      <div class="hud-stat" id="hud-depth"><span class="hud-icon">⬇</span><span id="depth-val">Depth 1</span></div>
      <div class="hud-stat" id="hud-gold"><span class="hud-icon">◈</span><span id="gold-val">0</span></div>
    </div>
    <div id="toast-container"></div>
  </div>

  <div id="overlay">
    <h1><span class="title-fusion">FUSION</span><span class="title-god">GOD</span></h1>
    <div class="subtitle">Dark Fantasy Card Crawler</div>
    <button class="btn" id="start-btn">ENTER THE DUNGEON</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/Card.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
